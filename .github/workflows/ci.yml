name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Workspace tests
        run: cargo test --workspace

      - name: Build extension wasm
        run: cargo build --target wasm32-wasip2

      - name: Build release server
        run: cargo build --release -p codex-companion-server

      - name: Package Linux release archive
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp target/release/codex-companion-server dist/
          tar -C dist -czf codex-companion-server-x86_64-unknown-linux-gnu.tar.gz codex-companion-server

      - name: Smoke test packaged Linux release archive
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf smoke
          mkdir -p smoke
          tar -C smoke -xzf codex-companion-server-x86_64-unknown-linux-gnu.tar.gz
          ./smoke/codex-companion-server status --root "$PWD" >/tmp/codex-status.txt
          grep -q "Codex Companion Cache" /tmp/codex-status.txt
